name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -v
        # Integration tests (Ollama, real API keys) are excluded by conftest.py
        # and the script-style test files that run module-level code.
        #
        # To run integration tests locally:
        #   python tests/test_pipeline.py
        #   python tests/test_curator.py
        #   python tests/test_observer.py
        #   python tests/test_active_agent.py
